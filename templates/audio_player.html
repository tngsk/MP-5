<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tone.js Audio Player Template</title>
    <!-- Tone.jsの読み込み -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>
    <h1>Tone.js 基本プレイヤー</h1>

    <!-- 音声コンテキストのロック解除用ボタン -->
    <button id="unlockBtn">1. Unlock Audio</button>

    <!-- ローカルファイル読み込み -->
    <input type="file" id="fileIn" accept="audio/*" disabled>

    <!-- 再生コントロール -->
    <button id="playBtn" disabled>Play</button>
    <button id="stopBtn" disabled>Stop</button>

    <div>
        <label>Pitch (再生速度): <input type="range" id="pitchSlider" min="0.1" max="3" step="0.1" value="1"></label>
    </div>
    <div>
        <label>Filter Cutoff: <input type="range" id="filterSlider" min="100" max="8000" step="100" value="8000"></label>
    </div>

    <script>
        let audioCtx, originalBuffer;
        let sourceNode, filterNode, gainNode;

        const unlockBtn = document.getElementById('unlockBtn');
        const fileIn = document.getElementById('fileIn');
        const playBtn = document.getElementById('playBtn');
        const stopBtn = document.getElementById('stopBtn');
        const pitchSlider = document.getElementById('pitchSlider');
        const filterSlider = document.getElementById('filterSlider');

        // 1. ユーザーアクションでオーディオをアンロックする
        unlockBtn.onclick = async () => {
            await Tone.start();
            audioCtx = Tone.context;

            // ルーティング: Source -> Filter -> Gain -> Destination
            filterNode = new Tone.Filter(8000, "lowpass");
            gainNode = new Tone.Gain(1.0);
            filterNode.connect(gainNode);
            gainNode.toDestination();

            unlockBtn.disabled = true;
            fileIn.disabled = false;
        };

        // 2. 音声ファイルのデコード
        fileIn.onchange = async (e) => {
            if (!e.target.files[0]) return;
            const arrayBuffer = await e.target.files[0].arrayBuffer();
            // AudioContextを使ってデコード
            originalBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            playBtn.disabled = false;
        };

        // 3. 再生処理
        playBtn.onclick = () => {
            if (!originalBuffer) return;

            // 毎回新しくソースノードを作成する
            sourceNode = audioCtx.createBufferSource();
            // Tone.ToneAudioBufferでラップして割り当てる (エラー回避のため)
            sourceNode.buffer = new Tone.ToneAudioBuffer(originalBuffer);
            sourceNode.loop = true;

            sourceNode.connect(filterNode);
            sourceNode.start();

            playBtn.disabled = true;
            stopBtn.disabled = false;
        };

        // 4. 停止処理
        stopBtn.onclick = () => {
            if (sourceNode) {
                sourceNode.stop();
                sourceNode.disconnect();
            }
            playBtn.disabled = false;
            stopBtn.disabled = true;
        };

        // パラメータのリアルタイム変更
        pitchSlider.oninput = (e) => {
            if (sourceNode) {
                // AudioParamの値はsetValueAtTimeまたはsetTargetAtTimeで滑らかに変更する
                sourceNode.playbackRate.setTargetAtTime(parseFloat(e.target.value), Tone.now(), 0.05);
            }
        };

        filterSlider.oninput = (e) => {
            if (filterNode) {
                filterNode.frequency.setTargetAtTime(parseFloat(e.target.value), Tone.now(), 0.05);
            }
        };
    </script>
</body>
</html>
