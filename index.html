<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOTION PLAYER MP-5</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg: #EAEAEA;
            --surface: #F5F5F5;
            --border: #CCCCCC;
            --text: #222222;
            --accent-cyan: #00A3E0;
            --accent-orange: #FF5A00;
            --grid-dot: #D0D0D0;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Space Mono', monospace;
            margin: 0; padding: 16px; background: var(--bg); color: var(--text);
            height: 100vh; display: flex; flex-direction: column;
            overflow: hidden; touch-action: none;
            background-image: radial-gradient(var(--grid-dot) 1px, transparent 1px);
            background-size: 16px 16px;
        }

        /* HARDWARE STAMP */
        .brand-stamp {
            font-size: 0.55rem; letter-spacing: 0.2em; opacity: 0.5; margin-bottom: 6px;
        }

        .display {
            flex: 1.2; position: relative; background: #111;
            border-radius: 6px; overflow: hidden; border: 2px solid var(--border);
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.3);
            margin-bottom: 12px; z-index: 10;
        }
        #canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        .handle {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: var(--accent-orange); cursor: ew-resize;
        }
        .handle::after {
            content: ''; position: absolute; bottom: 8px; left: -5px;
            width: 12px; height: 12px; background: var(--accent-orange);
            border-radius: 50%;
        }

        .matrix {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 12px; padding: 4px 0; flex: 2; margin-bottom: 12px; z-index: 10;
        }
        .col { display: flex; flex-direction: column; gap: 8px; }
        
        .slot {
            flex: 1; border-radius: 4px; background: var(--surface);
            display: flex; align-items: center; justify-content: center;
            transition: background 0.05s, transform 0.05s; 
            border: 1px solid var(--border); box-shadow: 0 2px 0 var(--border);
        }
        .slot:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--border); }
        .slot svg { width: 20px; height: 20px; stroke: var(--text); fill: none; opacity: 0.4; }
        
        .slot .sensor-label { font-size: 0.55rem; letter-spacing: 0.2em; margin-left: 6px; color: var(--text); opacity: 0.4; }
        .slot.active { background: var(--text); border-color: var(--text); box-shadow: 0 2px 0 #000; }
        .slot.active svg { stroke: var(--bg); fill: none; opacity: 1; }
        .slot.active .sensor-label { color: var(--bg); opacity: 1; }

        .controls {
            display: flex; height: 72px; gap: 24px; justify-content: center; align-items: center; z-index: 10;
        }
        .btn {
            width: 48px; height: 48px; border-radius: 50%; border: 1px solid var(--border); 
            background: var(--surface); display: flex; align-items: center; justify-content: center;
            box-shadow: 0 3px 0 var(--border); transition: all 0.05s; cursor: pointer;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--border); }
        
        .btn.rec.active { background: var(--accent-orange); border-color: var(--accent-orange); box-shadow: 0 3px 0 #C43900; }
        .btn.run.active { background: var(--accent-cyan); border-color: var(--accent-cyan); box-shadow: 0 3px 0 #0076A3; }
        .btn.panel-open { background: var(--text); border-color: var(--text); box-shadow: 0 3px 0 #000; }
        
        .btn svg { width: 18px; height: 18px; stroke: var(--text); fill: none; stroke-width: 2.5; }
        .btn.active svg, .btn.panel-open svg { stroke: #FFF; }

        /* FILE CONTROL PANEL */
        #filePanel {
            position: fixed; left: 16px; right: 16px; bottom: -60vh; height: 50vh;
            background: var(--surface); border: 2px solid var(--text);
            border-radius: 6px 6px 0 0; box-shadow: 0 -4px 16px rgba(0,0,0,0.1);
            transition: bottom 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; padding: 16px; z-index: 50;
            background-image: radial-gradient(var(--grid-dot) 1px, transparent 1px);
            background-size: 12px 12px;
        }
        #filePanel.open { bottom: 0; }
        
        .panel-section-title {
            font-size: 0.6rem; color: var(--text); letter-spacing: 0.15em;
            margin: 8px 0 4px 0; opacity: 0.7;
        }

        .upload-trigger {
            padding: 12px; background: var(--bg); border: 1px dashed var(--text);
            font-size: 0.7rem; text-align: center; cursor: pointer; border-radius: 4px;
            box-shadow: 0 2px 0 var(--border); transition: all 0.05s;
            font-weight: bold; margin-bottom: 12px;
        }
        .upload-trigger:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--border); }

        .file-list {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
        }
        .file-item {
            padding: 8px; background: var(--bg); border: 1px solid var(--border);
            font-size: 0.7rem; cursor: pointer; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
            border-radius: 3px; box-shadow: 0 1px 0 var(--border);
        }
        .file-item:active { background: var(--text); color: var(--bg); }

        #overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-image: radial-gradient(var(--grid-dot) 1px, transparent 1px); background-size: 16px 16px;
        }
        .init-btn {
            width: 64px; height: 64px; border-radius: 50%; background: var(--text); box-shadow: 0 4px 0 #000;
            display: flex; align-items: center; justify-content: center; color: var(--bg); font-size: 0.8rem; font-weight: bold; cursor: pointer;
            margin-bottom: 16px;
        }
        .overlay-logo {
            font-size: 0.7rem; letter-spacing: 0.3em; font-weight: bold; opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="overlay" onclick="unlock()">
        <div class="init-btn">I / O</div>
        <div class="overlay-logo">MP-5 // MOTION_PLAYER</div>
    </div>

    <div class="brand-stamp">MP-5 // MOTION_PLAYER</div>

    <div class="display">
        <canvas id="canvas"></canvas>
        <div id="hStart" class="handle" style="left: 15%"></div>
        <div id="hEnd" class="handle" style="right: 15%"></div>
    </div>

    <div class="matrix">
        <div class="col" id="col-pitch"></div>
        <div class="col" id="col-filter"></div>
        <div class="col" id="col-volume"></div>
    </div>

    <div class="controls">
        <button id="recBtn" class="btn rec">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7" fill="currentColor" stroke="none"/></svg>
        </button>
        <button id="loadBtn" class="btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
        <button id="runBtn" class="btn run">
            <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19" fill="currentColor" stroke="none"/></svg>
        </button>
    </div>

    <div id="filePanel">
        <div class="panel-section-title">01// LOCAL_IMPORT</div>
        <div class="upload-trigger" onclick="document.getElementById('fileIn').click()">CHOOSE_LOCAL_FILE...</div>
        <input type="file" id="fileIn" accept="audio/*" hidden>

        <div class="panel-section-title">02// PRESET_POOL</div>
        <div class="file-list" id="fileList"></div>
    </div>

    <script>
        const sensors = { T_X: 0.5, T_Y: 0.5, A_X: 0.5, A_Y: 0.5, A_Z: 0.5 };
        const mapping = { pitch: "A_Y", filter: "T_X", volume: "A_Z" };
        let audioCtx, recorder, stream, recordedBuffer, sourceNode, filterNode, gainNode;
        let isRec = false, isRun = false;
        let trim = { start: 0.15, end: 0.85 };
        let normalizationGain = 1.0;

        const icons = {
            T_X: '<svg viewBox="0 0 24 24" stroke-width="2.5"><line x1="4" y1="12" x2="20" y2="12"/><polyline points="16,8 20,12 16,16"/><polyline points="8,8 4,12 8,16"/></svg>',
            T_Y: '<svg viewBox="0 0 24 24" stroke-width="2.5"><line x1="12" y1="4" x2="12" y2="20"/><polyline points="8,16 12,20 16,16"/><polyline points="8,8 12,4 16,8"/></svg>',
            A_X: '<svg viewBox="0 0 24 24" stroke-width="2.5"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>',
            A_Y: '<svg viewBox="0 0 24 24" stroke-width="2.5"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="4" y1="9" x2="20" y2="9"/></svg>',
            A_Z: '<svg viewBox="0 0 24 24" stroke-width="2.5"><circle cx="12" cy="12" r="5"/></svg>'
        };

        ['pitch', 'filter', 'volume'].forEach(param => {
            const container = document.getElementById(`col-${param}`);
            Object.keys(sensors).forEach(s => {
                const slot = document.createElement('div');
                slot.className = `slot ${mapping[param] === s ? 'active' : ''}`;
                slot.innerHTML = `${icons[s]}<span class="sensor-label">${s}</span>`;
                slot.onclick = () => {
                    mapping[param] = s;
                    [...container.children].forEach(c => c.classList.remove('active'));
                    slot.classList.add('active');
                };
                container.appendChild(slot);
            });
        });

        async function unlock() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            filterNode = audioCtx.createBiquadFilter();
            gainNode = audioCtx.createGain();
            filterNode.connect(gainNode).connect(audioCtx.destination);
            
            document.getElementById('overlay').style.display = 'none';
            fetchServerFiles();
            requestAnimationFrame(draw);
        }

        async function fetchServerFiles() {
            try {
                const res = await fetch('/api/files');
                const data = await res.json();
                const listContainer = document.getElementById('fileList');
                listContainer.innerHTML = '';

                if (data.files && data.files.length > 0) {
                    data.files.forEach(filename => {
                        const item = document.createElement('div');
                        item.className = 'file-item';
                        item.innerText = filename.toUpperCase();
                        item.onclick = () => loadServerFile(filename);
                        listContainer.appendChild(item);
                    });
                } else {
                    listContainer.innerHTML = '<div style="font-size:0.6rem;opacity:0.5;padding:8px;">NO_PRESETS_FOUND</div>';
                }
            } catch (e) { console.error("Fetch error:", e); }
        }

        async function loadServerFile(filename) {
            try {
                const res = await fetch(`/data/${filename}`);
                const arrayBuffer = await res.arrayBuffer();
                recordedBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                calculateNormalization();
                togglePanel(false);
            } catch (e) { console.error("Decode error:", e); }
        }

        const fileIn = document.getElementById('fileIn');
        fileIn.onchange = async (e) => {
            if (!e.target.files[0]) return;
            try {
                const arrayBuffer = await e.target.files[0].arrayBuffer();
                recordedBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                calculateNormalization();
                togglePanel(false);
            } catch (err) { console.error("Local load error:", err); }
        };

        function calculateNormalization() {
            if (!recordedBuffer) return;
            const data = recordedBuffer.getChannelData(0);
            
            const startIdx = Math.max(0, Math.min(data.length - 1, Math.floor(data.length * trim.start)));
            const endIdx = Math.max(startIdx + 1, Math.min(data.length, Math.floor(data.length * trim.end)));
            
            let maxVal = 0.0;
            for (let i = startIdx; i < endIdx; i++) {
                const absVal = Math.abs(data[i]);
                if (absVal > maxVal) maxVal = absVal;
            }

            const targetLinear = Math.pow(10, -6 / 20); 
            normalizationGain = maxVal > 0.0001 ? (targetLinear / maxVal) : 1.0;
        }

        const loadBtn = document.getElementById('loadBtn');
        const filePanel = document.getElementById('filePanel');
        
        function togglePanel(forceState) {
            const shouldOpen = forceState !== undefined ? forceState : !filePanel.classList.contains('open');
            if (shouldOpen) {
                filePanel.classList.add('open');
                loadBtn.classList.add('panel-open');
                fetchServerFiles();
            } else {
                filePanel.classList.remove('open');
                loadBtn.classList.remove('panel-open');
            }
        }
        loadBtn.onclick = () => togglePanel();

        const recBtn = document.getElementById('recBtn');
        recBtn.onclick = () => {
            if (!isRec) {
                const chunks = [];
                recorder = new MediaRecorder(stream);
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks);
                    const arrayBuffer = await blob.arrayBuffer();
                    recordedBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    calculateNormalization();
                };
                recorder.start();
                isRec = true;
                recBtn.classList.add('active');
            } else {
                recorder.stop();
                isRec = false;
                recBtn.classList.remove('active');
            }
        };

        const runBtn = document.getElementById('runBtn');
        runBtn.onclick = () => {
            if (!recordedBuffer) return;
            if (isRun) {
                sourceNode.stop();
                isRun = false;
                runBtn.classList.remove('active');
            } else {
                sourceNode = audioCtx.createBufferSource();
                sourceNode.buffer = recordedBuffer;
                sourceNode.loop = true;
                sourceNode.loopStart = recordedBuffer.duration * trim.start;
                sourceNode.loopEnd = recordedBuffer.duration * trim.end;
                sourceNode.connect(filterNode);
                sourceNode.start(0, sourceNode.loopStart);
                isRun = true;
                runBtn.classList.add('active');
            }
        };

        function draw() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = canvas.clientWidth * window.devicePixelRatio;
            canvas.height = canvas.clientHeight * window.devicePixelRatio;

            if (recordedBuffer) {
                ctx.strokeStyle = isRun ? '#00FF66' : '#888888';
                ctx.lineWidth = 2 * window.devicePixelRatio;
                const data = recordedBuffer.getChannelData(0);
                const step = Math.ceil(data.length / canvas.width);
                ctx.beginPath();
                for (let i = 0; i < canvas.width; i++) {
                    const x = i;
                    const y = (0.5 + data[i * step] * 0.45) * canvas.height;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            if (isRun) {
                const now = audioCtx.currentTime;
                const pVal = sensors[mapping.pitch];
                const fVal = sensors[mapping.filter];
                const vVal = sensors[mapping.volume];

                sourceNode.playbackRate.setTargetAtTime(Math.pow(2, pVal * 2 - 1), now, 0.1);
                filterNode.frequency.setTargetAtTime(100 + Math.pow(fVal, 2) * 8000, now, 0.1);
                
                const finalGain = vVal * normalizationGain;
                gainNode.gain.setTargetAtTime(finalGain, now, 0.1);
            }
            requestAnimationFrame(draw);
        }

        window.onpointermove = (e) => {
            sensors.T_X = e.clientX / window.innerWidth;
            sensors.T_Y = e.clientY / window.innerHeight;
        };
        window.addEventListener('devicemotion', (e) => {
            const a = e.accelerationIncludingGravity;
            if (!a) return;
            sensors.A_X = (a.x + 9.8) / 19.6;
            sensors.A_Y = (a.y + 9.8) / 19.6;
            sensors.A_Z = (a.z + 9.8) / 19.6;
        });

        let activeHandle = null;
        const hS = document.getElementById('hStart'), hE = document.getElementById('hEnd');
        hS.onpointerdown = (e) => { e.stopPropagation(); activeHandle = 'start'; };
        hE.onpointerdown = (e) => { e.stopPropagation(); activeHandle = 'end'; };
        
        const endTrimDrag = () => {
            if (activeHandle) {
                calculateNormalization();
                if (isRun && sourceNode) {
                    sourceNode.loopStart = recordedBuffer.duration * trim.start;
                    sourceNode.loopEnd = recordedBuffer.duration * trim.end;
                }
                activeHandle = null;
            }
        };

        window.onpointerup = endTrimDrag;
        window.onpointercancel = endTrimDrag;

        window.addEventListener('pointermove', (e) => {
            if (!activeHandle) return;
            const x = Math.max(0, Math.min(1, e.clientX / window.innerWidth));
            if (activeHandle === 'start') {
                trim.start = Math.min(x, trim.end - 0.05);
                hS.style.left = (trim.start * 100) + '%';
            } else {
                trim.end = Math.max(x, trim.start + 0.05);
                hE.style.right = ((1 - trim.end) * 100) + '%';
            }
        });
    </script>
</body>
</html>
