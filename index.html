<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MOTION PLAYER MP-5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root {
            --bg: #F9F9F9;
            --surface: #FFFFFF;
            --border: #D1D1D1;
            --text: #1A1C1C;
            --text-secondary: #5F5E5E;
            --accent-cyan: #00E3FD;
            --accent-orange: #FF6B00;
            --grid-dot: #E2E2E2;
            --surface-dark: #2F3131;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 16px; background: var(--bg); color: var(--text);
            height: 100vh; height: 100dvh; display: flex; flex-direction: column;
            overflow: hidden; touch-action: none;
            background-image: radial-gradient(var(--grid-dot) 1px, transparent 1px);
            background-size: 16px 16px;
        }


        .mono-text, .pad-btn, .sensor-label, .settings-val-display, .file-item {
            font-family: 'JetBrains Mono', monospace;
        }

        .brand-stamp {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 12px; padding: 0 4px;
        }
        .header-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem; font-weight: 700; letter-spacing: 0.1em;
            color: var(--text);
            position: absolute; left: 50%; transform: translateX(-50%);
        }
        #settingsIconBtn {
            color: var(--accent-orange); opacity: 1; z-index: 20;
        }
        .battery-icon { color: var(--accent-orange); width: 14px; height: 14px; z-index: 20; }

        .display {
            flex: 1.2; position: relative; background: var(--surface-dark);
            border-radius: 4px; overflow: hidden; border: 1px solid var(--text);
            margin-bottom: 16px; z-index: 10;
        }
        .handle {
            position: absolute; top: 0; bottom: 0; width: 4px;
            background: var(--accent-orange); cursor: ew-resize;
        }

        #canvas { width: 100%; height: 100%; image-rendering: pixelated; }

        .handle {
            position: absolute; top: 0; bottom: 0; width: 2px;
            background: var(--accent-orange); cursor: ew-resize;
        }


        .matrix {
            display: flex; flex-direction: column; gap: 8px; flex: 2; margin-bottom: 12px; z-index: 10; min-height: 0;
        }
        .row { display: flex; flex-direction: column; gap: 4px; flex: 1; min-height: 0; }
        .row-label { font-size: 0.6rem; font-weight: bold; opacity: 0.6; letter-spacing: 0.1em; color: var(--text); }
        .slots { display: flex; flex-direction: row; gap: 6px; flex: 1; min-height: 0; }
        
        .slot {
            flex: 1; border-radius: 2px; background: var(--grid-dot);
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
            border: 1px solid var(--border);
            min-height: 0;
        }
        .slot svg { display: none; } /* Hide icons as per new design */

        .slot .sensor-label { display: none; }
        .slot.active { background: var(--accent-cyan); border-color: var(--accent-cyan); position: relative; }
        .slot.active::after {
            content: ''; position: absolute; width: 6px; height: 6px; background: var(--text); border-radius: 50%;
        }
        
        .matrix { display: flex; flex-direction: column; gap: 4px; flex: 2; margin-bottom: 12px; z-index: 10; min-height: 0; }
        .row-label { font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 700; opacity: 1; color: var(--text); width: 50px; flex-shrink: 0; display:flex; align-items:center; }
        .row { display: flex; flex-direction: row; gap: 8px; flex: 1; min-height: 0; }
        .slots { display: flex; flex-direction: row; gap: 4px; flex: 1; min-height: 0; }

        /* Add column headers for the matrix */
        .matrix-header { display: flex; flex-direction: row; gap: 8px; margin-bottom: 4px; }
        .matrix-header-empty { width: 50px; flex-shrink: 0; }
        .matrix-header-labels { display: flex; flex-direction: row; gap: 4px; flex: 1; }
        .matrix-col-label { flex: 1; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 0.55rem; color: var(--text); }

        .controls {
            display: flex; height: 64px; gap: 16px; justify-content: center; align-items: center; z-index: 10;
            flex-shrink: 0; margin-top: auto;
        }
        .btn {
            width: 64px; height: 48px; border-radius: 8px; border: 1px solid var(--text);
            background: var(--bg); display: flex; align-items: center; justify-content: center;
            transition: all 0.05s; cursor: pointer;
        }
        .btn:active { background: var(--grid-dot); }

        .btn.rec svg circle { stroke: var(--text); fill: none; stroke-width: 2.5; }
        .btn.rec.active svg circle { stroke: #ba1a1a; fill: #ba1a1a; }
        
        .btn.run { background: var(--accent-orange); border-color: var(--accent-orange); }
        .btn.run svg polygon { fill: var(--bg); }
        .btn.run:active { opacity: 0.8; background: var(--accent-orange); }
        .btn.run.active { background: var(--text); border-color: var(--text); }
        
        .btn.panel-open { background: var(--text); color: var(--bg); }
        .btn.panel-open svg { stroke: var(--bg); }

        .btn svg { width: 20px; height: 20px; stroke: var(--text); fill: none; stroke-width: 2; }
        .btn.run svg { stroke: none; }

        /* FILE CONTROL PANEL */
        #filePanel {
            position: fixed; left: 16px; right: 16px; bottom: -60vh; height: 50vh;
            background: var(--surface); border: 2px solid var(--text);
            border-radius: 6px 6px 0 0; box-shadow: 0 -4px 16px rgba(0,0,0,0.1);
            transition: bottom 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column; padding: 16px; z-index: 50;
            background-image: radial-gradient(var(--grid-dot) 1px, transparent 1px);
            background-size: 12px 12px;
        }
        #filePanel.open { bottom: 0; }
        
        #settingsPanel {
            position: fixed; inset: 0; background: var(--bg); z-index: 60;
            display: flex; flex-direction: column; padding: 16px;
            transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            background-image: radial-gradient(var(--grid-dot) 1px, transparent 1px);
            background-size: 16px 16px; overflow-y: auto;
        }
        #settingsPanel.open { transform: translateY(0); }

        .settings-header {
            font-size: 0.8rem; font-weight: bold; letter-spacing: 0.2em; margin-bottom: 24px;
            display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--text); padding-bottom: 8px;
        }

        .settings-group { margin-bottom: 20px; }
        .settings-group label { display: block; font-size: 0.65rem; font-weight: bold; margin-bottom: 8px; letter-spacing: 0.1em; opacity: 0.8; }

        .settings-input-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
        .settings-input-row input[type="number"] {
            flex: 1; padding: 8px; background: var(--surface); border: 1px solid var(--border);
            font-family: inherit; font-size: 0.8rem; color: var(--text); border-radius: 4px;
        }
        .settings-input-row input[type="range"] { flex: 1; }
        .settings-val-display { font-size: 0.7rem; font-weight: bold; width: 40px; text-align: right; }

        .settings-actions { display: flex; gap: 12px; margin-top: auto; padding-top: 24px; }
        .settings-btn {
            flex: 1; padding: 12px; font-family: inherit; font-size: 0.75rem; font-weight: bold;
            cursor: pointer; border-radius: 4px; transition: all 0.05s; border: 1px solid var(--border);
            box-shadow: 0 2px 0 var(--border); background: var(--surface);
        }
        .settings-btn:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--border); }
        .settings-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); box-shadow: 0 2px 0 #000; }
        .settings-btn.primary:active { box-shadow: 0 1px 0 #000; }

        #settingsIconBtn {
            background: none; border: none; cursor: pointer; padding: 0; color: var(--text); opacity: 0.6;
            display: flex; align-items: center; justify-content: center;
        }
        #settingsIconBtn:active { opacity: 1; }
        #settingsIconBtn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; }

        .panel-section-title {
            font-size: 0.6rem; color: var(--text); letter-spacing: 0.15em;
            margin: 8px 0 4px 0; opacity: 0.7;
        }

        .upload-trigger {
            padding: 12px; background: var(--bg); border: 1px dashed var(--text);
            font-size: 0.7rem; text-align: center; cursor: pointer; border-radius: 4px;
            box-shadow: 0 2px 0 var(--border); transition: all 0.05s;
            font-weight: bold; margin-bottom: 12px;
        }
        .upload-trigger:active { transform: translateY(1px); box-shadow: 0 1px 0 var(--border); }

        .file-list {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 4px;
        }
        .file-item {
            padding: 8px; background: var(--bg); border: 1px solid var(--border);
            font-size: 0.7rem; cursor: pointer; text-overflow: ellipsis; white-space: nowrap; overflow: hidden;
            border-radius: 3px; box-shadow: 0 1px 0 var(--border);
        }
        .file-item:active { background: var(--text); color: var(--bg); }

        #overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background-image: radial-gradient(var(--grid-dot) 1px, transparent 1px); background-size: 16px 16px;
            cursor: pointer;
        }
        .init-btn {
            width: 64px; height: 64px; border-radius: 50%; background: var(--text); box-shadow: 0 4px 0 #000;
            display: flex; align-items: center; justify-content: center; color: var(--bg); font-size: 0.8rem; font-weight: bold; cursor: pointer;
            margin-bottom: 16px;
        }
        .overlay-logo {
            font-size: 0.7rem; letter-spacing: 0.3em; font-weight: bold; opacity: 0.8;
        }

        /* MODE SELECTOR & PANELS */
        .mode-selector {
            display: flex; gap: 0; margin-bottom: 16px; z-index: 10; flex-shrink: 0;
            border: 1px solid var(--border); border-radius: 4px; overflow: hidden;
            background: var(--grid-dot);
        }
        .mode-btn {
            flex: 1; padding: 10px 0; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
            background: transparent; border: none;
            cursor: pointer; transition: all 0.1s;
            border-right: 1px solid var(--border);
            color: var(--text);
        }
        .mode-btn:last-child { border-right: none; }
        .mode-btn.active {
            background: var(--accent-cyan); color: var(--text);
        }
        .mode-panel {
            display: none; flex: 2; flex-direction: column; margin-bottom: 12px; z-index: 10; min-height: 0;
        }
        .mode-panel.active { display: flex; }

        /* XY PAD */
        .xy-controls {
            display: flex; gap: 16px; margin-bottom: 8px;
        }
        .xy-controls-col { flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .xy-controls-label { font-family: 'Inter', sans-serif; font-size: 0.6rem; font-weight: 700; color: var(--text); }
        .xy-controls select {
            width: 100%; padding: 8px; font-size: 0.65rem; font-family: 'JetBrains Mono', monospace;
            background: var(--bg); border: 1px solid var(--border); border-radius: 4px;
            appearance: none; color: var(--text);
        }
        .xy-pad {
            flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
            position: relative; touch-action: none; overflow: hidden;
            background-image:
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 12.5% 12.5%;
        }
        .xy-cursor {
            position: absolute; width: 12px; height: 12px; background: transparent;
            border: 2px solid var(--accent-cyan);
            border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none;
            top: 50%; left: 50%;
        }
        .xy-cursor::before {
            content: ''; position: absolute; top: 3px; left: -1000px; right: -1000px; height: 1px; background: rgba(0, 227, 253, 0.3);
        }
        .xy-cursor::after {
            content: ''; position: absolute; left: 3px; top: -1000px; bottom: -1000px; width: 1px; background: rgba(0, 227, 253, 0.3);
        }

        /* 16 PAD */
        .pad-grid {
            flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
            gap: 4px;
        }
        .pad-btn {
            background: var(--grid-dot); border: 1px solid var(--border); border-radius: 2px;
            cursor: pointer; display: flex; align-items: flex-start; justify-content: flex-start; padding: 4px;
            font-size: 0.6rem; color: var(--text); touch-action: none; transition: background 0.05s;
        }
        .pad-btn:active, .pad-btn.active {
            background: var(--accent-cyan); border-color: var(--accent-cyan);
        }
    </style>
</head>
<body>
    <div id="overlay" onclick="unlock()">
        <div class="init-btn">I / O</div>
        <div class="overlay-logo">MP-5 // MOTION_PLAYER</div>
    </div>

    <div class="brand-stamp">
        <button id="settingsIconBtn" onclick="openSettings()" aria-label="Settings" title="Settings">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="header-title">SAMPLER_01</div>
        <div class="battery-icon">
            <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><rect x="4" y="6" width="16" height="12" rx="2" /><path d="M20 10v4" /></svg>
        </div>
    </div>

    <div class="display">
        <canvas id="canvas"></canvas>
        <div id="hStart" class="handle" style="left: 15%; pointer-events: none;"></div>
        <div id="hEnd" class="handle" style="right: 15%"></div>
    </div>

    <div class="mode-selector">
        <button id="btn-gyro" class="mode-btn active" onclick="setMode('gyro')">GYRO</button>
        <button id="btn-xypad" class="mode-btn" onclick="setMode('xypad')">XY PAD</button>
        <button id="btn-16pad" class="mode-btn" onclick="setMode('16pad')">16 PAD</button>
    </div>

    <div id="panel-gyro" class="mode-panel active">
        <div class="matrix">
            <div class="matrix-header">
                <div class="matrix-header-empty"></div>
                <div class="matrix-header-labels">
                    <div class="matrix-col-label">A_X</div>
                    <div class="matrix-col-label">A_Y</div>
                    <div class="matrix-col-label">A_Z</div>
                    <div class="matrix-col-label">NONE</div>
                </div>
            </div>
            <div class="row">
                <div class="row-label">PITCH</div>
                <div class="slots" id="slots-pitch"></div>
            </div>
            <div class="row">
                <div class="row-label">FILTER</div>
                <div class="slots" id="slots-filter"></div>
            </div>
            <div class="row">
                <div class="row-label">SPEED</div>
                <div class="slots" id="slots-speed"></div>
            </div>
        </div>
    </div>

    <div id="panel-xypad" class="mode-panel" >
        <div class="xy-controls">
            <div class="xy-controls-col">
                <div class="xy-controls-label">X-AXIS</div>
                <select id="xy-x-param">
                    <option value="pitch">PITCH</option>
                    <option value="filter">FILTER</option>
                    <option value="speed">SPEED</option>
                </select>
            </div>
            <div class="xy-controls-col">
                <div class="xy-controls-label">Y-AXIS</div>
                <select id="xy-y-param">
                    <option value="filter">FILTER</option>
                    <option value="pitch">PITCH</option>
                    <option value="speed">SPEED</option>
                </select>
            </div>
        </div>
        <div class="xy-pad" id="xyPad">
            <div class="xy-cursor" id="xyCursor"></div>
        </div>
    </div>

    <div id="panel-16pad" class="mode-panel" >
        <div class="pad-grid" id="padGrid"></div>
    </div>

    <div class="controls">
        <button id="recBtn" class="btn rec" aria-label="Record Audio" title="Record Audio">
            <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/></svg>
        </button>
        <button id="loadBtn" class="btn" aria-label="Load Audio File" title="Load Audio File">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
        <button id="runBtn" class="btn run" aria-label="Play / Stop" title="Play / Stop">
            <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19" fill="currentColor" stroke="none"/></svg>
        </button>
    </div>

    <div id="filePanel">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div class="panel-section-title" style="margin: 0;">01// LOCAL_IMPORT</div>
            <button onclick="togglePanel(false)" style="background: none; border: none; font-size: 1.2rem; cursor: pointer; padding: 0; color: var(--text);" aria-label="Close File Panel" title="Close File Panel">&times;</button>
        </div>
        <div class="upload-trigger" onclick="document.getElementById('fileIn').click()">CHOOSE_LOCAL_FILE...</div>
        <input type="file" id="fileIn" accept="audio/*" hidden>

        <div class="panel-section-title">02// PRESET_POOL</div>
        <div class="file-list" id="fileList"></div>
    </div>

    <div id="settingsPanel">
        <div class="settings-header">
            <span>SETTINGS</span>
        </div>

        <div class="settings-group">
            <label>RECORDING_TIME (SEC)</label>
            <div class="settings-input-row">
                <input type="range" id="stgRecTime" min="1" max="10" step="1" oninput="document.getElementById('stgRecTimeVal').innerText = this.value + 's'">
                <div id="stgRecTimeVal" class="settings-val-display">5s</div>
            </div>
        </div>

        <div class="settings-group">
            <label>MAPPING_RANGES</label>
            <div class="settings-input-row">
                <span style="font-size:0.6rem; width:50px;">PITCH ±</span>
                <input type="number" id="stgPitchRange" min="100" max="12000" step="100">
                <span style="font-size:0.6rem;">cents</span>
            </div>
            <div class="settings-input-row">
                <span style="font-size:0.6rem; width:50px;">FILTER</span>
                <input type="number" id="stgFilterMax" min="1000" max="20000" step="500">
                <span style="font-size:0.6rem;">Hz</span>
            </div>
            <div class="settings-input-row">
                <span style="font-size:0.6rem; width:50px;">SPEED</span>
                <input type="number" id="stgSpeedMax" min="2" max="20" step="1">
                <span style="font-size:0.6rem;">x max</span>
            </div>
        </div>

        <div class="settings-actions">
            <button class="settings-btn" onclick="closeSettings(false)">キャンセル</button>
            <button class="settings-btn primary" onclick="closeSettings(true)">完了</button>
        </div>
    </div>

    <script>
        const sensors = { NONE: 0.5, A_X: 0.5, A_Y: 0.5, A_Z: 0.5 };
        const mapping = { pitch: "A_Y", filter: "A_X", speed: "NONE" };
        let currentMode = 'gyro';
        let xyValues = { x: 0.5, y: 0.5 };
        let activePadPitch = null;
        let audioCtx, recorder, stream, recordedBuffer, originalBuffer, sourceNode, filterNode, gainNode;
        let isRec = false, isRun = false;
        let trim = { start: 0.15, end: 0.85 };
        let normalizationGain = 1.0;
        let offsetRatio = 0.0;

        let appSettings = { recDuration: 5, pitchRange: 4800, filterMax: 8000, speedMax: 10 };
        let recTimeout = null;
        let padPlayTimeout = null;

        const icons = {
            NONE: '<svg viewBox="0 0 24 24" stroke-width="2.5"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>',
            A_X: '<svg viewBox="0 0 24 24" stroke-width="2.5"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="9" y1="4" x2="9" y2="20"/></svg>',
            A_Y: '<svg viewBox="0 0 24 24" stroke-width="2.5"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="4" y1="9" x2="20" y2="9"/></svg>',
            A_Z: '<svg viewBox="0 0 24 24" stroke-width="2.5"><circle cx="12" cy="12" r="5"/></svg>'
        };

        ['pitch', 'filter', 'speed'].forEach(param => {
            const container = document.getElementById(`slots-${param}`);
            Object.keys(sensors).forEach(s => {
                const slot = document.createElement('div');
                slot.className = `slot ${mapping[param] === s ? 'active' : ''}`;
                slot.innerHTML = `${icons[s]}<span class="sensor-label">${s}</span>`;
                slot.onclick = () => {
                    mapping[param] = s;
                    [...container.children].forEach(c => c.classList.remove('active'));
                    slot.classList.add('active');
                };
                container.appendChild(slot);
            });
        });

        async function unlock() {
            try {
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    const permissionState = await DeviceMotionEvent.requestPermission();
                    if (permissionState !== 'granted') {
                        console.warn('Device motion permission not granted');
                    }
                }
            } catch (e) {
                console.error("Device motion permission error:", e);
            }

            await Tone.start();
            audioCtx = Tone.context;
            try {
                if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                    stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                } else {
                    console.warn('navigator.mediaDevices.getUserMedia is not supported or not available (e.g. HTTP)');
                }
            } catch (e) {
                console.warn("Microphone access denied or error:", e);
            }

            filterNode = new Tone.Filter();
            gainNode = new Tone.Gain();
            filterNode.connect(gainNode);
            gainNode.toDestination();
            
            document.getElementById('overlay').style.display = 'none';
            fetchServerFiles();
            requestAnimationFrame(draw);
        }

        async function fetchServerFiles() {
            try {
                const res = await fetch('/api/files');
                const data = await res.json();
                const listContainer = document.getElementById('fileList');
                listContainer.innerHTML = '';

                if (data.files && data.files.length > 0) {
                    data.files.forEach(filename => {
                        const item = document.createElement('div');
                        item.className = 'file-item';
                        item.innerText = filename.toUpperCase();
                        item.onclick = () => loadServerFile(filename);
                        listContainer.appendChild(item);
                    });
                } else {
                    listContainer.innerHTML = '<div style="font-size:0.6rem;opacity:0.5;padding:8px;">NO_PRESETS_FOUND</div>';
                }
            } catch (e) { console.error("Fetch error:", e); }
        }

        async function loadServerFile(filename) {
            try {
                const res = await fetch(`/data/${filename}`);
                const arrayBuffer = await res.arrayBuffer();
                originalBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                offsetRatio = 0.0;
                applyOffset();
                togglePanel(false);
            } catch (e) { console.error("Decode error:", e); }
        }

        const fileIn = document.getElementById('fileIn');
        fileIn.onchange = async (e) => {
            if (!e.target.files[0]) return;
            try {
                const arrayBuffer = await e.target.files[0].arrayBuffer();
                originalBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                offsetRatio = 0.0;
                applyOffset();
                togglePanel(false);
            } catch (err) { console.error("Local load error:", err); }
        };

        function applyOffset() {
            if (!originalBuffer) return;
            recordedBuffer = audioCtx.createBuffer(1, originalBuffer.length, originalBuffer.sampleRate);
            const src = originalBuffer.getChannelData(0);
            const dst = recordedBuffer.getChannelData(0);
            const len = originalBuffer.length;

            // Calculate effective offset including the visual start point
            // This makes the start of the buffer visually align with the hStart handle when offsetRatio is 0
            const effectiveRatio = ((offsetRatio + trim.start) % 1.0 + 1.0) % 1.0;
            const offsetSamples = Math.floor(len * effectiveRatio);

            // ⚡ Bolt Optimization: Replace slow JS modulo loop with native Float32Array operations
            // This is ~25x faster, crucial for smooth UI when dragging the offset handle
            if (offsetSamples > 0) {
                dst.set(src.subarray(len - offsetSamples), 0);
                dst.set(src.subarray(0, len - offsetSamples), offsetSamples);
            } else {
                dst.set(src);
            }
            calculateNormalization();
            if (isRun && sourceNode) {
                sourceNode.buffer = new Tone.ToneAudioBuffer(recordedBuffer);
            }
        }

        function calculateNormalization() {
            if (!recordedBuffer) return;
            const data = recordedBuffer.getChannelData(0);
            
            const startIdx = Math.max(0, Math.min(data.length - 1, Math.floor(data.length * trim.start)));
            const endIdx = Math.max(startIdx + 1, Math.min(data.length, Math.floor(data.length * trim.end)));
            
            let maxVal = 0.0;
            for (let i = startIdx; i < endIdx; i++) {
                const absVal = Math.abs(data[i]);
                if (absVal > maxVal) maxVal = absVal;
            }

            const targetLinear = Math.pow(10, -6 / 20); 
            normalizationGain = maxVal > 0.0001 ? (targetLinear / maxVal) : 1.0;
        }

        const loadBtn = document.getElementById('loadBtn');
        const filePanel = document.getElementById('filePanel');
        
        function togglePanel(forceState) {
            const shouldOpen = forceState !== undefined ? forceState : !filePanel.classList.contains('open');
            if (shouldOpen) {
                filePanel.classList.add('open');
                loadBtn.classList.add('panel-open');
                fetchServerFiles();
            } else {
                filePanel.classList.remove('open');
                loadBtn.classList.remove('panel-open');
            }
        }
        loadBtn.onclick = () => togglePanel();

        function openSettings() {
            document.getElementById('stgRecTime').value = appSettings.recDuration;
            document.getElementById('stgRecTimeVal').innerText = appSettings.recDuration + 's';
            document.getElementById('stgPitchRange').value = appSettings.pitchRange;
            document.getElementById('stgFilterMax').value = appSettings.filterMax;
            document.getElementById('stgSpeedMax').value = appSettings.speedMax;
            document.getElementById('settingsPanel').classList.add('open');
        }

        function closeSettings(save) {
            if (save) {
                appSettings.recDuration = parseInt(document.getElementById('stgRecTime').value);
                appSettings.pitchRange = parseInt(document.getElementById('stgPitchRange').value);
                appSettings.filterMax = parseInt(document.getElementById('stgFilterMax').value);
                appSettings.speedMax = parseInt(document.getElementById('stgSpeedMax').value);
            }
            document.getElementById('settingsPanel').classList.remove('open');
        }

        const recBtn = document.getElementById('recBtn');
        recBtn.onclick = () => {
            if (!stream) {
                alert("Microphone is not available. Please allow access and reload, or use HTTPS.");
                return;
            }
            if (!isRec) {
                const chunks = [];
                recorder = new MediaRecorder(stream);
                recorder.ondataavailable = e => chunks.push(e.data);
                recorder.onstop = async () => {
                    const blob = new Blob(chunks);
                    const arrayBuffer = await blob.arrayBuffer();
                    originalBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                    offsetRatio = 0.0;
                    applyOffset();
                };
                recorder.start();
                isRec = true;
                recBtn.classList.add('active');

                recTimeout = setTimeout(() => {
                    if (isRec) {
                        recorder.stop();
                        isRec = false;
                        recBtn.classList.remove('active');
                    }
                }, appSettings.recDuration * 1000);
            } else {
                if (recTimeout) clearTimeout(recTimeout);
                recorder.stop();
                isRec = false;
                recBtn.classList.remove('active');
            }
        };

        const runBtn = document.getElementById('runBtn');
        runBtn.onclick = () => {
            if (currentMode === '16pad') return;
            if (!recordedBuffer) return;
            if (isRun) {
                sourceNode.stop();
                sourceNode.dispose();
                isRun = false;
                runBtn.classList.remove('active');
            } else {
                sourceNode = new Tone.GrainPlayer(recordedBuffer);
                sourceNode.loop = true;
                sourceNode.loopStart = recordedBuffer.duration * trim.start;
                sourceNode.loopEnd = recordedBuffer.duration * trim.end;
                sourceNode.connect(filterNode);
                sourceNode.start(0, sourceNode.loopStart);
                isRun = true;
                runBtn.classList.add('active');
            }
        };

        function draw() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            // ⚡ Bolt Optimization: Avoid unnecessary canvas buffer reallocation
            // by only updating width/height when they actually change.
            const targetWidth = Math.floor(canvas.clientWidth * window.devicePixelRatio);
            const targetHeight = Math.floor(canvas.clientHeight * window.devicePixelRatio);

            if (canvas.width !== targetWidth || canvas.height !== targetHeight) {
                canvas.width = targetWidth;
                canvas.height = targetHeight;
            } else {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }

            if (recordedBuffer) {
                ctx.strokeStyle = isRun ? '#00E3FD' : '#888888';
                ctx.lineWidth = 2 * window.devicePixelRatio;
                const data = recordedBuffer.getChannelData(0);
                const step = Math.ceil(data.length / canvas.width);
                ctx.beginPath();
                for (let i = 0; i < canvas.width; i++) {
                    const x = i;
                    const y = (0.5 + data[i * step] * 0.45) * canvas.height;
                    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
                }
                ctx.stroke();
            }

            if (isRun) {
                const now = Tone.now();

                let pVal = 0.5, fVal = 0.5, sVal = 0.5;
                let activePitchMap = mapping.pitch;
                let activeFilterMap = mapping.filter;
                let activeSpeedMap = mapping.speed;

                if (currentMode === 'gyro') {
                    pVal = sensors[mapping.pitch];
                    fVal = sensors[mapping.filter];
                    sVal = sensors[mapping.speed];
                } else if (currentMode === 'xypad') {
                    const xp = document.getElementById('xy-x-param').value;
                    const yp = document.getElementById('xy-y-param').value;
                    if (xp === 'pitch') { pVal = xyValues.x; activePitchMap = 'XY'; } else if (yp === 'pitch') { pVal = 1.0 - xyValues.y; activePitchMap = 'XY'; }
                    if (xp === 'filter') { fVal = xyValues.x; activeFilterMap = 'XY'; } else if (yp === 'filter') { fVal = 1.0 - xyValues.y; activeFilterMap = 'XY'; }
                    if (xp === 'speed') { sVal = xyValues.x; activeSpeedMap = 'XY'; } else if (yp === 'speed') { sVal = 1.0 - xyValues.y; activeSpeedMap = 'XY'; }
                } else if (currentMode === '16pad') {
                    activePitchMap = '16PAD';
                    activeFilterMap = 'NONE';
                    activeSpeedMap = 'NONE';
                }

                if (currentMode === '16pad' && activePadPitch !== null) {
                    sourceNode.detune = activePadPitch;
                } else if (activePitchMap === "NONE") {
                    sourceNode.detune = 0;
                } else {
                    sourceNode.detune = (pVal - 0.5) * appSettings.pitchRange;
                }

                if (activeFilterMap === "NONE") {
                    filterNode.frequency.value = 20000;
                } else {
                    filterNode.frequency.rampTo(100 + Math.pow(fVal, 2) * appSettings.filterMax, 0.1);
                }

                if (activeSpeedMap === "NONE") {
                    sourceNode.playbackRate = 1.0;
                } else {
                    const maxSpeedLog = Math.log10(appSettings.speedMax);
                    sourceNode.playbackRate = Math.pow(10, sVal * 2 * maxSpeedLog - maxSpeedLog);
                }
                
                gainNode.gain.rampTo(normalizationGain, 0.1);
            }
            requestAnimationFrame(draw);
        }


        window.addEventListener('devicemotion', (e) => {
            const a = e.accelerationIncludingGravity;
            if (!a) return;
            sensors.A_X = (a.x + 9.8) / 19.6;
            sensors.A_Y = (a.y + 9.8) / 19.6;
            sensors.A_Z = (a.z + 9.8) / 19.6;
        });

        let activeHandle = null;
        const hE = document.getElementById('hEnd');
        
        const endTrimDrag = () => {
            if (activeHandle) {
                calculateNormalization();
                if (isRun && sourceNode) {
                    sourceNode.loopStart = recordedBuffer.duration * trim.start;
                    sourceNode.loopEnd = recordedBuffer.duration * trim.end;
                }
                activeHandle = null;
            }
        };

        let isOffsetDrag = false;
        let startOffsetX = 0;
        let startOffsetRatio = 0;
        const displayEl = document.querySelector('.display');

        displayEl.addEventListener('pointerdown', (e) => {
            if (activeHandle) return;
            const rect = displayEl.getBoundingClientRect();
            const relativeX = e.clientX - rect.left;
            if (relativeX < displayEl.clientWidth / 2) {
                isOffsetDrag = true;
                startOffsetX = e.clientX;
                startOffsetRatio = offsetRatio;
                displayEl.setPointerCapture(e.pointerId);
            } else {
                activeHandle = 'end';
                displayEl.setPointerCapture(e.pointerId);
            }
        });

        window.onpointerup = (e) => {
            endTrimDrag();
            if (isOffsetDrag || activeHandle) {
                displayEl.releasePointerCapture(e.pointerId);
                isOffsetDrag = false;
                activeHandle = null;
            }
        };
        window.onpointercancel = (e) => {
            endTrimDrag();
            isOffsetDrag = false;
            activeHandle = null;
        };

        window.addEventListener('pointermove', (e) => {
            if (activeHandle === 'end') {
                const rect = displayEl.getBoundingClientRect();
                const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / displayEl.clientWidth));
                trim.end = Math.max(trim.start + 0.05, x); // End must be at least 0.05 after start
                hE.style.right = ((1 - trim.end) * 100) + '%';
            } else if (isOffsetDrag) {
                const deltaX = e.clientX - startOffsetX;
                let newRatio = startOffsetRatio + (deltaX / displayEl.clientWidth);
                offsetRatio = (newRatio % 1.0 + 1.0) % 1.0;
                applyOffset();
            }
        });

        function setMode(mode) {
            if (currentMode !== mode) {
                if (padPlayTimeout) {
                    clearTimeout(padPlayTimeout);
                    padPlayTimeout = null;
                }
                if (isRun && sourceNode) {
                    sourceNode.stop();
                    sourceNode.dispose();
                    isRun = false;
                    document.getElementById('runBtn').classList.remove('active');
                }
            }
            currentMode = mode;
            ['gyro', 'xypad', '16pad'].forEach(m => {
                document.getElementById(`btn-${m}`).classList.toggle('active', m === mode);
                document.getElementById(`panel-${m}`).classList.toggle('active', m === mode);
            });
            if (mode === '16pad') activePadPitch = null; // reset on enter
        }

        // XY Pad logic
        const xyPad = document.getElementById('xyPad');
        const xyCursor = document.getElementById('xyCursor');
        let isXYDrag = false;

        function updateXY(e) {
            const rect = xyPad.getBoundingClientRect();
            let x = (e.clientX - rect.left) / rect.width;
            let y = (e.clientY - rect.top) / rect.height;
            x = Math.max(0, Math.min(1, x));
            y = Math.max(0, Math.min(1, y));
            xyValues.x = x;
            xyValues.y = y;
            xyCursor.style.left = `${x * 100}%`;
            xyCursor.style.top = `${y * 100}%`;
        }

        xyPad.addEventListener('pointerdown', e => { isXYDrag = true; updateXY(e); xyPad.setPointerCapture(e.pointerId); });
        xyPad.addEventListener('pointermove', e => { if (isXYDrag) updateXY(e); });
        xyPad.addEventListener('pointerup', e => { isXYDrag = false; xyPad.releasePointerCapture(e.pointerId); });
        xyPad.addEventListener('pointercancel', e => { isXYDrag = false; });

        // 16 Pad logic
        const padGrid = document.getElementById('padGrid');
        const padLabels = ['C','D','E','F', '8','9','A','B', '4','5','6','7', '0','1','2','3'];
        // Let's make 0 at bottom left, F at top right.
        // We assign pitch detune in cents.
        const baseDetune = -800; // start
        const stepDetune = 100; // semitone per pad

        for (let i = 0; i < 16; i++) {
            const btn = document.createElement('button');
            btn.className = 'pad-btn';
            btn.innerText = padLabels[i];

            // Map index from layout logic:
            // The visual grid is:
            // C D E F (idx 0-3, pitch 12-15)
            // 8 9 A B (idx 4-7, pitch 8-11)
            // 4 5 6 7 (idx 8-11, pitch 4-7)
            // 0 1 2 3 (idx 12-15, pitch 0-3)

            let row = Math.floor(i / 4);
            let col = i % 4;
            let pitchIndex = (3 - row) * 4 + col; // 0 for bottom-left, 15 for top-right
            let pitchValue = pitchIndex * stepDetune; // 0 to 1500 cents relative

            // Event listeners
            btn.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                btn.setPointerCapture(e.pointerId);
                btn.classList.add('active');
                activePadPitch = pitchValue;

                if (!recordedBuffer) return;

                if (padPlayTimeout) {
                    clearTimeout(padPlayTimeout);
                    padPlayTimeout = null;
                }

                if (isRun && sourceNode) {
                    sourceNode.stop();
                    sourceNode.dispose();
                }

                sourceNode = new Tone.GrainPlayer(recordedBuffer);
                sourceNode.loop = false;

                const duration = recordedBuffer.duration * (trim.end - trim.start);
                const offset = recordedBuffer.duration * trim.start;

                sourceNode.connect(filterNode);
                sourceNode.detune = activePadPitch;

                sourceNode.start(0, offset, duration);

                isRun = true;
                const runBtn = document.getElementById('runBtn');
                runBtn.classList.add('active');

                padPlayTimeout = setTimeout(() => {
                    if (currentMode === '16pad') {
                        isRun = false;
                        runBtn.classList.remove('active');
                    }
                }, duration * 1000);
            });
            const releasePad = () => {
                btn.classList.remove('active');
            };
            btn.addEventListener('pointerup', releasePad);
            btn.addEventListener('pointercancel', releasePad);
            btn.addEventListener('pointerout', releasePad);

            padGrid.appendChild(btn);
        }
    </script>
</body>
</html>
